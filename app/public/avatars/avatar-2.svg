      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0f1724"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#01acff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#01acff" stop-opacity="0"/>
