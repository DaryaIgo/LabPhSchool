  <!-- Wave / Oscillation -->
  <path d="M30 100 Q55 60, 80 100 T130 100 T180 100" fill="none" stroke="#01acff" stroke-width="3" stroke-linecap="round"/>
  <path d="M30 120 Q55 80, 80 120 T130 120 T180 120" fill="none" stroke="#2eff8c" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M30 80 Q55 40, 80 80 T130 80 T180 80" fill="none" stroke="#ffcb3d" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Axis -->
