<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0f1724"/>
    </linearGradient>
    <linearGradient id="glow4" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="96" fill="url(#bg4)" stroke="#a78bfa" stroke-width="2"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#glow4)" stroke-width="4"/>
  <!-- Planet orbit -->
  <ellipse cx="100" cy="100" rx="60" ry="22" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.6" transform="rotate(-20 100 100)"/>
  <ellipse cx="100" cy="100" rx="45" ry="45" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
  <!-- Central star -->
  <circle cx="100" cy="100" r="14" fill="#a78bfa"/>
  <circle cx="100" cy="100" r="8" fill="#fff"/>
  <!-- Planet -->
  <circle cx="155" cy="85" r="7" fill="#01acff"/>
  <circle cx="155" cy="85" r="3" fill="#fff" opacity="0.5"/>
  <!-- Moon -->
  <circle cx="50" cy="110" r="4" fill="#2eff8c"/>
  <!-- Gravity field lines -->
  <path d="M100 70 Q120 85, 100 100 Q80 115, 100 130" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
  <path d="M100 70 Q80 85, 100 100 Q120 115, 100 130" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
</svg>